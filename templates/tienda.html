<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --panel: #ffffff;
            --line: #e5e7eb;
            --text: #111827;
            --muted: #6b7280;
            --accent: #f45d08;
            --accent-dark: #cc4a03;
            --chip: #eef2ff;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }
        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            background: #fff;
            border-bottom: 1px solid var(--line);
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .mobile-menu-btn {
            display: none;
            border: 1px solid #d1d5db;
            background: #fff;
            color: #111827;
            border-radius: 9px;
            padding: 8px 10px;
            font-weight: 800;
            cursor: pointer;
        }
        .menu-quick-btn {
            border: 1px solid #d1d5db;
            background: #fff;
            color: #111827;
            border-radius: 9px;
            padding: 8px 10px;
            font-weight: 800;
            cursor: pointer;
        }
        .brand {
            font-weight: 800;
            color: #1f2937;
        }
        .search {
            width: min(460px, 100%);
        }
        .search input {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 9px 10px;
        }
        .layout {
            max-width: 1360px;
            margin: 0 auto;
            padding: 14px;
            display: grid;
            grid-template-columns: 220px 1fr 320px;
            gap: 14px;
        }
        .left-nav, .cart-panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            height: fit-content;
        }
        .left-nav {
            position: sticky;
            top: 70px;
            padding: 12px;
        }
        .left-nav h3 {
            margin: 0 0 10px;
            font-size: 0.98rem;
        }
        .cat-list {
            display: grid;
            gap: 6px;
        }
        .cat-btn {
            border: 0;
            background: transparent;
            text-align: left;
            border-radius: 8px;
            padding: 8px 10px;
            cursor: pointer;
            color: #374151;
            font-weight: 600;
        }
        .cat-btn:hover { background: #f3f4f6; }
        .cat-btn.active {
            background: #ffedd5;
            color: #9a3412;
        }
        .content {
            display: grid;
            gap: 14px;
        }
        .section {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px;
        }
        .section h2 {
            margin: 0 0 10px;
            font-size: 1.2rem;
        }
        .tienda-estado-banner {
            border: 1px solid #86efac;
            border-radius: 12px;
            background: #f0fdf4;
            color: #166534;
            padding: 11px 12px;
            font-size: .92rem;
            font-weight: 700;
        }
        .tienda-estado-banner.cerrada {
            border-color: #fecaca;
            background: #fff1f2;
            color: #991b1b;
        }
        .scroller {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 10px;
        }
        .ofertas-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .ofertas-head h2 {
            margin: 0;
        }
        .ofertas-nav {
            display: inline-flex;
            gap: 6px;
        }
        .ofertas-nav-btn {
            width: 32px;
            height: 32px;
            border-radius: 999px;
            border: 1px solid #d1d5db;
            background: #fff;
            color: #334155;
            font-weight: 900;
            cursor: pointer;
        }
        .ofertas-track {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding-bottom: 4px;
        }
        .ofertas-track .item-card {
            flex: 0 0 min(320px, 88vw);
            width: min(320px, 88vw);
            scroll-snap-align: start;
        }
        .item-card {
            border: 1px solid #ececec;
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
            display: grid;
            grid-template-rows: auto 1fr;
            position: relative;
        }
        .item-card.oferta {
            border: 1px solid #fdba74;
            box-shadow: 0 0 0 1px rgba(251, 146, 60, .35), 0 14px 26px rgba(251, 146, 60, .26);
        }
        .item-card.oferta::before {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: 12px;
            pointer-events: none;
            border: 1px solid rgba(249, 115, 22, .7);
            box-shadow: 0 0 22px rgba(251, 146, 60, .45);
        }
        .fav-tag {
            position: absolute;
            top: 7px;
            left: 7px;
            background: #059669;
            color: #fff;
            border-radius: 7px;
            padding: 2px 7px;
            font-size: 0.72rem;
            font-weight: 800;
        }
        .item-photo {
            background: #faf5f0;
            width: 100%;
            aspect-ratio: 1.2631578947;
            min-height: 150px;
            display: grid;
            place-items: center;
            overflow: hidden;
        }
        .item-photo img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            object-position: center;
        }
        .item-photo .fallback {
            font-size: 1.8rem;
            color: #fdba74;
            font-weight: 800;
        }
        .item-body {
            padding: 9px 10px 11px;
            display: grid;
            gap: 5px;
        }
        .item-name {
            font-weight: 700;
            line-height: 1.28;
            min-height: 38px;
        }
        .item-desc {
            font-size: 0.84rem;
            color: var(--muted);
            min-height: 30px;
        }
        .price-row {
            display: flex;
            align-items: baseline;
            gap: 6px;
            flex-wrap: wrap;
        }
        .price-final {
            color: #7c2d12;
            font-weight: 800;
            font-size: 1.03rem;
        }
        .item-card.oferta .price-final {
            font-size: 1.34rem;
            color: #9a3412;
        }
        .price-old {
            color: #9ca3af;
            text-decoration: line-through;
            font-size: 0.86rem;
        }
        .discount-chip {
            font-size: 0.74rem;
            font-weight: 800;
            color: #fff;
            background: #ef4444;
            border-radius: 999px;
            padding: 2px 6px;
        }
        .agotado-chip {
            font-size: 0.72rem;
            font-weight: 800;
            color: #fff;
            background: #64748b;
            border-radius: 999px;
            padding: 2px 6px;
        }
        .stock {
            font-size: 0.82rem;
            color: #6b7280;
        }
        .quick-add {
            position: absolute;
            right: 8px;
            bottom: 8px;
            width: 34px;
            height: 34px;
            border-radius: 999px;
            border: 1px solid #d1d5db;
            background: #fff;
            font-size: 1.25rem;
            line-height: 1;
            cursor: pointer;
            color: #111827;
            font-weight: 700;
        }
        .quick-add:disabled {
            opacity: .45;
            cursor: not-allowed;
        }
        .cart-panel {
            position: sticky;
            top: 70px;
            padding: 12px;
            align-self: start;
        }
        .cart-panel h3 {
            margin: 0 0 9px;
            font-size: 1rem;
        }
        .cart-list {
            display: grid;
            gap: 8px;
            max-height: 320px;
            overflow: auto;
        }
        .cart-item {
            border: 1px solid #f0f0f0;
            border-radius: 9px;
            padding: 8px;
            display: grid;
            gap: 6px;
        }
        .cart-item-row {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            align-items: center;
        }
        .qty-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .qty-btn {
            width: 24px;
            height: 24px;
            border: 1px solid #d1d5db;
            border-radius: 7px;
            background: #fff;
            cursor: pointer;
        }
        .cart-meta {
            margin-top: 8px;
            display: grid;
            gap: 8px;
        }
        .cart-meta input {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 9px;
            padding: 9px 10px;
        }
        .coupon-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 6px;
            align-items: center;
        }
        .coupon-btn {
            border: 1px solid #d1d5db;
            background: #fff;
            color: #374151;
            border-radius: 8px;
            padding: 9px 10px;
            font-size: 0.82rem;
            font-weight: 800;
            cursor: pointer;
        }
        .coupon-btn:hover { border-color: #94a3b8; }
        .cart-meta label {
            display: grid;
            gap: 4px;
            color: #64748b;
            font-size: 0.82rem;
            font-weight: 700;
        }
        .line-total {
            margin: 6px 0 0;
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            color: #374151;
            font-size: 0.9rem;
        }
        .line-total.discount {
            color: #b91c1c;
        }
        .total {
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            font-weight: 800;
        }
        .checkout-btn {
            width: 100%;
            border: 0;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            padding: 10px;
            font-weight: 800;
            cursor: pointer;
        }
        .checkout-btn:hover { background: var(--accent-dark); }
        .clear-cart-btn {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            background: #fff;
            color: #374151;
            padding: 9px 10px;
            font-weight: 700;
            margin-top: 8px;
            cursor: pointer;
        }
        .clear-cart-btn:hover {
            border-color: #94a3b8;
        }
        .msg {
            min-height: 18px;
            margin-top: 8px;
            color: var(--muted);
            font-size: 0.88rem;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(17, 24, 39, .55);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 40;
            padding: 14px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            width: min(460px, 96vw);
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            padding: 14px;
            display: grid;
            gap: 10px;
        }
        .modal h3 { margin: 0; }
        .modal .two {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .phone-wrap {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 6px;
            align-items: center;
        }
        .phone-prefix {
            border: 1px solid #d1d5db;
            border-radius: 9px;
            background: #f8fafc;
            padding: 10px;
            font-weight: 700;
            color: #334155;
            min-width: 58px;
            text-align: center;
        }
        .modal input {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 9px;
            padding: 10px;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .btn-muted {
            border: 1px solid #d1d5db;
            background: #fff;
            color: #374151;
            border-radius: 8px;
            padding: 9px 12px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-primary {
            border: 0;
            background: var(--accent);
            color: #fff;
            border-radius: 8px;
            padding: 9px 12px;
            font-weight: 800;
            cursor: pointer;
        }
        .mobile-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(17, 24, 39, .5);
            z-index: 45;
        }
        .mobile-overlay.active {
            display: block;
        }
        .mobile-cart-fab {
            display: none;
            position: fixed;
            right: 14px;
            bottom: 14px;
            z-index: 46;
            border: 0;
            border-radius: 999px;
            background: var(--accent);
            color: #fff;
            padding: 12px 14px;
            font-weight: 800;
            box-shadow: 0 8px 20px rgba(0,0,0,.25);
            cursor: pointer;
        }
        .mobile-cart-fab .badge {
            display: inline-grid;
            place-items: center;
            min-width: 22px;
            height: 22px;
            border-radius: 999px;
            background: #111827;
            color: #fff;
            font-size: .75rem;
            margin-left: 6px;
            padding: 0 6px;
        }
        .mobile-menu-fab {
            display: none;
            position: fixed;
            left: 14px;
            bottom: 14px;
            z-index: 46;
            border: 0;
            border-radius: 999px;
            background: #111827;
            color: #fff;
            padding: 12px 14px;
            font-weight: 800;
            box-shadow: 0 8px 20px rgba(0,0,0,.25);
            cursor: pointer;
        }
        @media (max-width: 1180px) {
            .layout {
                grid-template-columns: 1fr;
            }
            .left-nav, .cart-panel {
                position: static;
            }
        }
        @media (max-width: 900px) {
            .topbar {
                justify-content: space-between;
                padding: 10px 12px;
            }
            .mobile-menu-btn {
                display: inline-block;
            }
            .brand {
                font-size: .95rem;
            }
            .search {
                width: 100%;
            }
            .layout {
                padding: 10px;
                gap: 10px;
            }
            .left-nav {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: 84vw;
                max-width: 320px;
                z-index: 50;
                border-radius: 0 14px 14px 0;
                transform: translateX(-105%);
                transition: transform .22s ease;
                overflow: auto;
            }
            .left-nav.mobile-open {
                transform: translateX(0);
            }
            .cart-panel {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                top: auto;
                z-index: 50;
                border-radius: 14px 14px 0 0;
                transform: translateY(105%);
                transition: transform .22s ease;
                max-height: 82vh;
                overflow: auto;
            }
            .cart-panel.mobile-open {
                transform: translateY(0);
            }
            .mobile-cart-fab {
                display: inline-flex;
                align-items: center;
            }
            .mobile-menu-fab {
                display: inline-flex;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <button type="button" class="mobile-menu-btn" id="btn-mobile-menu">Menu</button>
        <div class="brand">Tienda en linea</div>
        <div class="search">
            <input id="search-input" type="search" placeholder="Buscar productos...">
        </div>
        <button type="button" class="menu-quick-btn" id="btn-menu-quick">Categorias</button>
    </header>

    <main class="layout">
        <aside class="left-nav">
            <h3>Menu</h3>
            <div class="cat-list" id="cat-list"></div>
        </aside>

        <section class="content">
            <div class="tienda-estado-banner" id="tienda-estado-banner">Cargando estado de tienda...</div>
            <div class="section" id="sec-ofertas">
                <div class="ofertas-head">
                    <h2>Ofertas</h2>
                    <div class="ofertas-nav">
                        <button type="button" class="ofertas-nav-btn" id="ofertas-prev" aria-label="Ver ofertas anteriores">&#8249;</button>
                        <button type="button" class="ofertas-nav-btn" id="ofertas-next" aria-label="Ver más ofertas">&#8250;</button>
                    </div>
                </div>
                <div class="ofertas-track" id="ofertas-list"></div>
            </div>

            <div class="section" id="sec-destacados">
                <h2>Articulos destacados</h2>
                <div class="scroller" id="destacados-list"></div>
            </div>

            <div id="categorias-wrap"></div>
        </section>

        <aside class="cart-panel">
            <h3>Tu compra</h3>
            <div class="cart-list" id="cart-list"></div>
            <div class="cart-meta">
                <label for="codigo-descuento">Codigo de descuento</label>
                <div class="coupon-row">
                    <input id="codigo-descuento" type="text" maxlength="40" placeholder="Ej: SUCREE10">
                    <button type="button" id="btn-aplicar-cupon" class="coupon-btn">Aplicar</button>
                </div>
            </div>
            <div class="line-total">
                <span>Subtotal</span>
                <span id="subtotal-monto">$0</span>
            </div>
            <div class="line-total discount">
                <span>Descuento</span>
                <span id="descuento-monto">-$0</span>
            </div>
            <div class="total">
                <span>Total</span>
                <span id="total">$0</span>
            </div>
            <button class="checkout-btn" id="btn-checkout" type="button">Confirmar compra</button>
            <button class="clear-cart-btn" id="btn-clear-cart" type="button">Vaciar carrito</button>
            <div class="msg" id="msg"></div>
        </aside>
    </main>

    <div class="mobile-overlay" id="mobile-overlay"></div>
    <button type="button" class="mobile-menu-fab" id="mobile-menu-fab">Menu</button>
    <button type="button" class="mobile-cart-fab" id="mobile-cart-fab">Carrito <span class="badge" id="mobile-cart-count">0</span></button>

    <div class="modal-overlay" id="modal-cliente">
        <div class="modal">
            <h3>Datos para confirmar pedido</h3>
            <div style="font-size:.9rem;color:#64748b;">Necesitamos tu correo y telefono para contactarte.</div>
            <input id="cliente-nombre" type="text" placeholder="Nombre completo">
            <div class="two">
                <input id="cliente-email" type="email" placeholder="Correo electronico">
                <div class="phone-wrap">
                    <span class="phone-prefix">+569</span>
                    <input id="cliente-telefono" type="tel" inputmode="numeric" maxlength="8" placeholder="12345678">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-muted" type="button" id="modal-cliente-cancel">Cancelar</button>
                <button class="btn-primary" type="button" id="modal-cliente-ok">Enviar pedido</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-exito-pedido">
        <div class="modal">
            <h3>Pedido recibido</h3>
            <div id="modal-exito-texto" style="font-size:.92rem;color:#374151;"></div>
            <div class="modal-actions">
                <button class="btn-primary" type="button" id="modal-exito-cerrar">Entendido</button>
            </div>
        </div>
    </div>

    <script>
        const money = new Intl.NumberFormat("es-CL", { style: "currency", currency: "CLP", maximumFractionDigits: 0 });
        const catListEl = document.getElementById("cat-list");
        const destacadosListEl = document.getElementById("destacados-list");
        const ofertasListEl = document.getElementById("ofertas-list");
        const categoriasWrapEl = document.getElementById("categorias-wrap");
        const cartListEl = document.getElementById("cart-list");
        const subtotalMontoEl = document.getElementById("subtotal-monto");
        const descuentoMontoEl = document.getElementById("descuento-monto");
        const totalEl = document.getElementById("total");
        const msgEl = document.getElementById("msg");
        const searchInputEl = document.getElementById("search-input");
        const codigoDescuentoEl = document.getElementById("codigo-descuento");
        const btnAplicarCuponEl = document.getElementById("btn-aplicar-cupon");
        const modalClienteEl = document.getElementById("modal-cliente");
        const clienteNombreEl = document.getElementById("cliente-nombre");
        const clienteEmailEl = document.getElementById("cliente-email");
        const clienteTelefonoEl = document.getElementById("cliente-telefono");
        const modalExitoEl = document.getElementById("modal-exito-pedido");
        const modalExitoTextoEl = document.getElementById("modal-exito-texto");
        const leftNavEl = document.querySelector(".left-nav");
        const cartPanelEl = document.querySelector(".cart-panel");
        const btnMobileMenuEl = document.getElementById("btn-mobile-menu");
        const btnMenuQuickEl = document.getElementById("btn-menu-quick");
        const mobileMenuFabEl = document.getElementById("mobile-menu-fab");
        const mobileOverlayEl = document.getElementById("mobile-overlay");
        const mobileCartFabEl = document.getElementById("mobile-cart-fab");
        const mobileCartCountEl = document.getElementById("mobile-cart-count");
        const tiendaEstadoBannerEl = document.getElementById("tienda-estado-banner");
        const ofertasPrevBtnEl = document.getElementById("ofertas-prev");
        const ofertasNextBtnEl = document.getElementById("ofertas-next");

        let productos = [];
        let categoriasDisponibles = [];
        let carrito = [];
        let categoriaActiva = "TODOS";
        let cuponAplicado = { codigo: "", descuento_monto: 0 };
        let tiendaAbierta = true;
        let tiendaEstadoMensaje = "";
        const tiendaSessionId = (() => {
            const key = "tienda_session_id";
            let value = localStorage.getItem(key);
            if (!value) {
                value = `ts_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 10)}`;
                localStorage.setItem(key, value);
            }
            return value;
        })();

        function esc(text) {
            return String(text || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function msg(text, isErr = false) {
            msgEl.textContent = text || "";
            msgEl.style.color = isErr ? "#b91c1c" : "#6b7280";
        }

        function setEstadoTienda(abierta, mensaje) {
            tiendaAbierta = Boolean(abierta);
            tiendaEstadoMensaje = String(mensaje || "").trim();
            if (tiendaEstadoBannerEl) {
                tiendaEstadoBannerEl.classList.toggle("cerrada", !tiendaAbierta);
                tiendaEstadoBannerEl.textContent = tiendaAbierta
                    ? (tiendaEstadoMensaje || "Tienda abierta.")
                    : (tiendaEstadoMensaje || "Tienda cerrada. Puedes ver productos, pero no comprar por ahora.");
            }
            const checkoutBtn = document.getElementById("btn-checkout");
            if (checkoutBtn) {
                checkoutBtn.disabled = !tiendaAbierta;
                checkoutBtn.style.opacity = tiendaAbierta ? "1" : ".6";
                checkoutBtn.title = tiendaAbierta ? "" : "La tienda esta cerrada";
            }
        }

        function n(v) {
            const x = Number(v || 0);
            return Number.isFinite(x) ? x : 0;
        }

        function nombreCategoria(p) {
            return String(p.categoria_tienda || "General").trim() || "General";
        }

        function cumpleBusqueda(p) {
            const q = String(searchInputEl.value || "").trim().toLowerCase();
            if (!q) return true;
            const blob = `${p.nombre || ""} ${p.descripcion_tienda || ""} ${nombreCategoria(p)}`.toLowerCase();
            return blob.includes(q);
        }

        function visiblePorCategoria(p) {
            if (categoriaActiva === "TODOS") return true;
            if (categoriaActiva === "OFERTAS") return n(p.descuento_tienda_pct) > 0;
            if (categoriaActiva === "DESTACADOS") return Boolean(p.destacado_tienda);
            return nombreCategoria(p) === categoriaActiva;
        }

        function productoFiltrado(p) {
            return cumpleBusqueda(p) && visiblePorCategoria(p);
        }

        function imgStyle(p) {
            const fit = p.foto_fit_tienda === "contain" ? "contain" : "cover";
            const legacyPos = ["center", "top", "bottom"].includes(String(p.foto_pos_tienda || "")) ? p.foto_pos_tienda : "center";
            let posX = Number(p.foto_pos_x_tienda ?? 50);
            let posY = Number(p.foto_pos_y_tienda ?? 50);
            if (!Number.isFinite(posX)) posX = 50;
            if (!Number.isFinite(posY)) posY = legacyPos === "top" ? 0 : legacyPos === "bottom" ? 100 : 50;
            posX = Math.max(0, Math.min(100, posX));
            posY = Math.max(0, Math.min(100, posY));
            let zoom = Number(p.foto_zoom_tienda ?? 100);
            if (!Number.isFinite(zoom)) zoom = 100;
            zoom = Math.max(50, Math.min(220, zoom));
            return `object-fit:${fit};object-position:${posX}% ${posY}%;transform:scale(${zoom / 100});transform-origin:${posX}% ${posY}%;`;
        }

        function fotoHtml(p) {
            const srcDirect = String(p.foto_url || "").trim();
            const rel = String(p.foto || "").trim();
            const src = srcDirect || (rel ? `/static/${rel}` : "");
            if (!src) return `<div class="fallback">*</div>`;
            return `<img src="${esc(src)}?v=${Date.now()}" alt="${esc(p.nombre)}" style="${imgStyle(p)}">`;
        }

        function cardHtml(p, compact = false) {
            const oldPrice = n(p.precio_base);
            const finalPrice = n(p.precio_final);
            const hasDiscount = n(p.descuento_tienda_pct) > 0 && oldPrice > finalPrice;
            const desc = String(p.descripcion_tienda || "").trim();
            const stock = Math.max(0, Number(p.max_compra || 0));
            const agotado = stock <= 0;
            const esOferta = hasDiscount;
            return `
                <article class="item-card ${esOferta ? "oferta" : ""}">
                    ${Boolean(p.destacado_tienda) ? `<span class="fav-tag">#de tus favoritos</span>` : ""}
                    <div class="item-photo">${fotoHtml(p)}</div>
                    <div class="item-body">
                        <div class="item-name">${esc(p.nombre)}</div>
                        <div class="price-row">
                            <span class="price-final">${money.format(finalPrice)}</span>
                            ${hasDiscount ? `<span class="price-old">${money.format(oldPrice)}</span>` : ""}
                            ${hasDiscount ? `<span class="discount-chip">-${Math.round(n(p.descuento_tienda_pct))}%</span>` : ""}
                            ${agotado ? `<span class="agotado-chip">Agotado</span>` : ""}
                        </div>
                        <div class="item-desc">${esc(desc || "Sin descripcion")}</div>
                        <div class="stock">Disponible: ${stock} unidad(es)</div>
                    </div>
                    <button class="quick-add" type="button" onclick="agregar(${p.id})" ${agotado ? "disabled title=\"Producto agotado\"" : ""}>+</button>
                </article>
            `;
        }

        function renderCategoriasMenu() {
            const cats = new Set(["TODOS", "DESTACADOS", "OFERTAS"]);
            if (Array.isArray(categoriasDisponibles) && categoriasDisponibles.length) {
                categoriasDisponibles.forEach((c) => {
                    const nombre = String(c.nombre || "").trim();
                    if (nombre) cats.add(nombre);
                });
            } else {
                productos.forEach((p) => cats.add(nombreCategoria(p)));
            }
            const all = Array.from(cats);
            catListEl.innerHTML = all.map((c) => {
                const label = c === "TODOS" ? "Todos" : c === "DESTACADOS" ? "Articulos destacados" : c === "OFERTAS" ? "Ofertas" : c;
                const active = c === categoriaActiva ? "active" : "";
                return `<button type="button" class="cat-btn ${active}" onclick="cambiarCategoria('${esc(c)}')">${esc(label)}</button>`;
            }).join("");
        }

        function _trackTienda(evento = "heartbeat") {
            try {
                const total = carrito.reduce((acc, it) => acc + (Number(it.cantidad || 0) * Number(it.precio_unitario || 0)), 0);
                const payload = {
                    session_id: tiendaSessionId,
                    evento,
                    pagina: "/tienda",
                    carrito_items: carrito.reduce((acc, it) => acc + Number(it.cantidad || 0), 0),
                    carrito_total: Math.max(0, Number(total || 0)),
                };
                fetch("/api/tienda/track", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                    keepalive: true,
                }).catch(() => {});
            } catch (_) {}
        }

        function renderSecciones() {
            const visibles = productos.filter((p) => productoFiltrado(p));

            const destacados = visibles
                .filter((p) => Boolean(p.destacado_tienda))
                .sort((a, b) => Number(a.orden_tienda || 0) - Number(b.orden_tienda || 0));
            const destacadosFinal = destacados.length ? destacados : visibles.slice(0, 12);
            destacadosListEl.innerHTML = destacadosFinal.length
                ? destacadosFinal.map((p) => cardHtml(p, true)).join("")
                : "<div>No hay destacados.</div>";

            const ofertas = visibles
                .filter((p) => n(p.descuento_tienda_pct) > 0)
                .sort((a, b) => n(b.descuento_tienda_pct) - n(a.descuento_tienda_pct));
            ofertasListEl.innerHTML = ofertas.length
                ? ofertas.map((p) => cardHtml(p)).join("")
                : "<div>No hay ofertas activas.</div>";

            const porCategoria = {};
            visibles.forEach((p) => {
                const c = nombreCategoria(p);
                if (!porCategoria[c]) porCategoria[c] = [];
                porCategoria[c].push(p);
            });
            const catNames = Object.keys(porCategoria).sort((a, b) => a.localeCompare(b, "es"));
            categoriasWrapEl.innerHTML = catNames.map((cat) => `
                <section class="section" id="cat-${esc(cat)}">
                    <h2>${esc(cat)}</h2>
                    <div class="grid">
                        ${porCategoria[cat]
                            .sort((a, b) => Number(a.orden_tienda || 0) - Number(b.orden_tienda || 0))
                            .map((p) => cardHtml(p))
                            .join("")}
                    </div>
                </section>
            `).join("");
        }

        function renderCart() {
            if (!carrito.length) {
                cartListEl.innerHTML = "<div>El carrito esta vacio.</div>";
                subtotalMontoEl.textContent = money.format(0);
                descuentoMontoEl.textContent = `-${money.format(0)}`;
                totalEl.textContent = money.format(0);
                if (mobileCartCountEl) mobileCartCountEl.textContent = "0";
                _trackTienda("cart");
                return;
            }
            cartListEl.innerHTML = carrito.map((it) => `
                <div class="cart-item">
                    <div class="cart-item-row"><strong>${esc(it.nombre)}</strong><span>${money.format(it.precio_unitario)}</span></div>
                    <div class="cart-item-row">
                        <div class="qty-wrap">
                            <button class="qty-btn" type="button" onclick="restar(${it.id})">-</button>
                            <span>${it.cantidad}</span>
                            <button class="qty-btn" type="button" onclick="sumar(${it.id})">+</button>
                        </div>
                        <span>${money.format(it.cantidad * it.precio_unitario)}</span>
                    </div>
                </div>
            `).join("");
            const subtotal = carrito.reduce((acc, it) => acc + (it.cantidad * it.precio_unitario), 0);
            const descuento = Math.max(0, Number(cuponAplicado.descuento_monto || 0));
            const total = Math.max(0, subtotal - descuento);
            subtotalMontoEl.textContent = money.format(subtotal);
            descuentoMontoEl.textContent = `-${money.format(descuento)}`;
            totalEl.textContent = money.format(total);
            if (mobileCartCountEl) {
                const count = carrito.reduce((acc, it) => acc + Number(it.cantidad || 0), 0);
                mobileCartCountEl.textContent = String(count);
            }
            _trackTienda("cart");
        }

        function limpiarCuponAplicado() {
            if (!cuponAplicado.codigo && !cuponAplicado.descuento_monto) return;
            cuponAplicado = { codigo: "", descuento_monto: 0 };
            renderCart();
            msg("Se reinicio el cupon por cambios en el carrito.");
        }

        async function aplicarCupon() {
            if (!tiendaAbierta) return msg("La tienda esta cerrada. No se pueden aplicar descuentos.", true);
            const codigo = String(codigoDescuentoEl.value || "").trim();
            if (!codigo) return msg("Ingresa un codigo de descuento.", true);
            if (!carrito.length) return msg("Agrega productos antes de aplicar cupón.", true);
            msg("Validando cupon...");
            try {
                const payload = {
                    codigo_descuento: codigo,
                    items: carrito.map((it) => ({ id: it.id, cantidad: it.cantidad }))
                };
                const res = await fetch("/api/tienda/cupon/validar", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!res.ok || !data.success) throw new Error(data.error || "Cupon invalido");
                cuponAplicado = {
                    codigo: String(data.codigo_descuento || codigo).trim(),
                    descuento_monto: Number(data.descuento_monto || 0)
                };
                codigoDescuentoEl.value = cuponAplicado.codigo;
                renderCart();
                msg(`Cupon aplicado. Descuento: ${money.format(cuponAplicado.descuento_monto)}`);
            } catch (e) {
                cuponAplicado = { codigo: "", descuento_monto: 0 };
                renderCart();
                msg(e.message || "No se pudo aplicar el cupon", true);
            }
        }

        function agregar(id) {
            if (!tiendaAbierta) return msg("La tienda esta cerrada. No se pueden agregar productos al carrito.", true);
            const p = productos.find((x) => x.id === id);
            if (!p) return;
            const max = Math.max(0, Number(p.max_compra || 0));
            if (max <= 0) return msg("Producto sin stock disponible.", true);
            const it = carrito.find((x) => x.id === id);
            if (it) {
                if (it.cantidad >= max) return msg(`Maximo ${max} unidad(es) para ${p.nombre}.`, true);
                it.cantidad += 1;
            } else {
                carrito.push({
                    id: p.id,
                    nombre: p.nombre,
                    cantidad: 1,
                    precio_unitario: n(p.precio_final)
                });
            }
            limpiarCuponAplicado();
            msg("");
            renderCart();
        }

        function sumar(id) {
            if (!tiendaAbierta) return msg("La tienda esta cerrada. No se pueden modificar compras.", true);
            const it = carrito.find((x) => x.id === id);
            const p = productos.find((x) => x.id === id);
            if (!it || !p) return;
            const max = Math.max(0, Number(p.max_compra || 0));
            if (it.cantidad >= max) return msg(`No puedes superar ${max} unidad(es).`, true);
            it.cantidad += 1;
            limpiarCuponAplicado();
            renderCart();
        }

        function restar(id) {
            const it = carrito.find((x) => x.id === id);
            if (!it) return;
            it.cantidad -= 1;
            if (it.cantidad <= 0) {
                carrito = carrito.filter((x) => x.id !== id);
            }
            limpiarCuponAplicado();
            renderCart();
        }

        function cambiarCategoria(cat) {
            categoriaActiva = cat;
            renderCategoriasMenu();
            renderSecciones();
        }

        async function cargarProductos() {
            msg("Cargando productos...");
            try {
                const res = await fetch("/api/tienda/productos", { headers: { Accept: "application/json" } });
                const data = await res.json();
                if (!res.ok || !data.success) throw new Error(data.error || "No se pudo cargar el catalogo");
                productos = Array.isArray(data.productos) ? data.productos : [];
                categoriasDisponibles = Array.isArray(data.categorias)
                    ? data.categorias.filter((c) => Boolean(c.activa_en_tienda))
                    : [];
                setEstadoTienda(Boolean(data.tienda_abierta !== false), String((data.estado_tienda || {}).mensaje || ""));
                renderCategoriasMenu();
                renderSecciones();
                msg("");
                _trackTienda("view");
            } catch (e) {
                productos = [];
                categoriasDisponibles = [];
                setEstadoTienda(false, "No se pudo validar el estado de la tienda.");
                renderCategoriasMenu();
                renderSecciones();
                msg(e.message || "Error cargando productos", true);
            }
        }

        async function checkout() {
            if (!tiendaAbierta) return msg("La tienda esta cerrada por el momento.", true);
            if (!carrito.length) return msg("Agrega productos al carrito.", true);
            modalClienteEl.classList.add("active");
        }

        function cerrarModalCliente() {
            modalClienteEl.classList.remove("active");
        }

        function abrirModalExito(texto) {
            modalExitoTextoEl.textContent = texto || "Pedido ingresado correctamente. Te contactaremos a la brevedad.";
            modalExitoEl.classList.add("active");
        }

        function cerrarModalExito() {
            modalExitoEl.classList.remove("active");
        }

        function abrirMenuMobile() {
            if (!leftNavEl || !mobileOverlayEl) return;
            const isMobile = window.matchMedia("(max-width: 900px)").matches;
            if (isMobile) {
                leftNavEl.classList.add("mobile-open");
                mobileOverlayEl.classList.add("active");
                return;
            }
            leftNavEl.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        function scrollOfertas(dir) {
            if (!ofertasListEl) return;
            const delta = Math.max(260, Math.round(ofertasListEl.clientWidth * 0.72));
            ofertasListEl.scrollBy({ left: dir * delta, behavior: "smooth" });
        }

        function abrirCarritoMobile() {
            if (!cartPanelEl || !mobileOverlayEl) return;
            cartPanelEl.classList.add("mobile-open");
            mobileOverlayEl.classList.add("active");
        }

        function cerrarPanelesMobile() {
            if (leftNavEl) leftNavEl.classList.remove("mobile-open");
            if (cartPanelEl) cartPanelEl.classList.remove("mobile-open");
            if (mobileOverlayEl) mobileOverlayEl.classList.remove("active");
        }

        async function confirmarCheckoutDesdeModal() {
            if (!tiendaAbierta) return msg("La tienda esta cerrada por el momento.", true);
            if (!carrito.length) return msg("Agrega productos al carrito.", true);
            const nombre = String(clienteNombreEl.value || "").trim();
            const email = String(clienteEmailEl.value || "").trim().toLowerCase();
            const telefonoDig = String(clienteTelefonoEl.value || "").replace(/\D+/g, "");
            const telefono = `+569${telefonoDig}`;
            if (nombre.length < 2) {
                return msg("Ingresa tu nombre.", true);
            }
            if (!email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
                return msg("Ingresa un correo valido.", true);
            }
            if (telefonoDig.length !== 8) {
                return msg("El telefono debe tener exactamente 8 digitos.", true);
            }
            msg("Procesando compra...");
            const payload = {
                items: carrito.map((it) => ({ id: it.id, cantidad: it.cantidad, precio_unitario: it.precio_unitario })),
                codigo_descuento: String(codigoDescuentoEl.value || "").trim(),
                cliente_nombre: nombre,
                cliente_email: email,
                cliente_telefono: telefono,
                fecha_venta: new Date().toISOString().slice(0, 10)
            };
            try {
                const res = await fetch("/api/tienda/checkout", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!res.ok || !data.success) throw new Error(data.error || "No se pudo procesar la compra");
                carrito = [];
                codigoDescuentoEl.value = "";
                cuponAplicado = { codigo: "", descuento_monto: 0 };
                renderCart();
                cerrarModalCliente();
                abrirModalExito("Tu pedido fue ingresado correctamente y sera contactado a la brevedad.");
                msg(`Compra confirmada. Venta #${data.venta_id}`);
                _trackTienda("checkout");
                await cargarProductos();
            } catch (e) {
                msg(e.message || "Error procesando compra", true);
            }
        }

        window.agregar = agregar;
        window.sumar = sumar;
        window.restar = restar;
        window.cambiarCategoria = cambiarCategoria;
        window.vaciarCarrito = () => {
            carrito = [];
            cuponAplicado = { codigo: "", descuento_monto: 0 };
            if (codigoDescuentoEl) codigoDescuentoEl.value = "";
            renderCart();
            msg("Carrito vaciado.");
        };

        searchInputEl.addEventListener("input", renderSecciones);
        document.getElementById("btn-checkout").addEventListener("click", checkout);
        document.getElementById("btn-clear-cart").addEventListener("click", () => window.vaciarCarrito());
        btnAplicarCuponEl.addEventListener("click", aplicarCupon);
        document.getElementById("modal-cliente-cancel").addEventListener("click", cerrarModalCliente);
        document.getElementById("modal-cliente-ok").addEventListener("click", confirmarCheckoutDesdeModal);
        document.getElementById("modal-exito-cerrar").addEventListener("click", cerrarModalExito);
        modalClienteEl.addEventListener("click", (ev) => { if (ev.target === modalClienteEl) cerrarModalCliente(); });
        modalExitoEl.addEventListener("click", (ev) => { if (ev.target === modalExitoEl) cerrarModalExito(); });
        if (btnMobileMenuEl) btnMobileMenuEl.addEventListener("click", abrirMenuMobile);
        if (btnMenuQuickEl) btnMenuQuickEl.addEventListener("click", abrirMenuMobile);
        if (mobileMenuFabEl) mobileMenuFabEl.addEventListener("click", abrirMenuMobile);
        if (ofertasPrevBtnEl) ofertasPrevBtnEl.addEventListener("click", () => scrollOfertas(-1));
        if (ofertasNextBtnEl) ofertasNextBtnEl.addEventListener("click", () => scrollOfertas(1));
        if (mobileCartFabEl) mobileCartFabEl.addEventListener("click", abrirCarritoMobile);
        if (mobileOverlayEl) mobileOverlayEl.addEventListener("click", cerrarPanelesMobile);
        if (clienteTelefonoEl) {
            clienteTelefonoEl.addEventListener("input", () => {
                const onlyDigits = String(clienteTelefonoEl.value || "").replace(/\D+/g, "").slice(0, 8);
                clienteTelefonoEl.value = onlyDigits;
            });
        }

        renderCart();
        cargarProductos();
        _trackTienda("view");
        setInterval(() => _trackTienda("heartbeat"), 30000);
    </script>
</body>
</html>
