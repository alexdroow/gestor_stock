<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sucr&eacute;e Pasteler&iacute;a{% endblock %}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #f59e0b;
            --primary-dark: #d97706;
            --secondary: #f97316;
            --accent: #fbbf24;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            color: #0f172a;
        }
        
        /* Sidebar */
        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid #e2e8f0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 32px;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 24px;
        }
        
        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }
        
        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
        }
        
        .logo-text span { 
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            text-decoration: none;
            color: #64748b;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .nav-item:hover {
            background: #fff7ed;
            color: var(--primary-dark);
        }
        
        .nav-item.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }
        
        .nav-item .icon {
            font-size: 20px;
            width: 24px;
            text-align: center;
        }
        
        .nav-badge {
            margin-left: auto;
            background: #ef4444;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
        }
        
        .sidebar-footer {
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
            font-size: 13px;
            color: #64748b;
            text-align: center;
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 32px 40px;
            max-width: calc(100% - 260px);
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        
        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: #0f172a;
        }
        
        .page-subtitle {
            color: #64748b;
            margin-top: 4px;
        }
        
        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(245, 158, 11, 0.4);
        }
        
        .btn-secondary {
            background: #f1f5f9;
            color: #64748b;
            border: 1px solid #e2e8f0;
        }
        
        .btn-secondary:hover {
            background: #e2e8f0;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        
        .btn-success:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
        
        .btn-warning {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }
        
        /* Cards */
        .card {
            background: white;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            margin-bottom: 24px;
        }
        
        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
        }
        
        .card-body {
            padding: 24px;
        }
        
        /* Tables */
        .table-wrapper {
            overflow-x: auto;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        .data-table th {
            text-align: left;
            padding: 16px;
            font-weight: 600;
            color: #64748b;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #e2e8f0;
            background: #f8fafc;
        }
        
        .data-table td {
            padding: 16px;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
        }
        
        .data-table tbody tr:hover {
            background: #f8fafc;
        }
        
        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .badge-danger {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .badge-warning {
            background: #fef3c7;
            color: #92400e;
        }
        
        /* Forms */
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
            margin-bottom: 6px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }
        
        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            transform: scale(0.95);
            transition: all 0.2s ease;
        }
        
        .modal-overlay.active .modal {
            transform: scale(1);
        }
        
        /* MODO OSCURO */
        body.dark-mode {
            background: #0f172a;
            color: #f1f5f9;
        }
        
        body.dark-mode .sidebar {
            background: #1e293b;
            border-color: #334155;
        }
        
        body.dark-mode .logo-text {
            color: #f1f5f9;
        }
        
        body.dark-mode .nav-item {
            color: #94a3b8;
        }
        
        body.dark-mode .nav-item:hover {
            background: #334155;
            color: #f1f5f9;
        }
        
        body.dark-mode .main-content {
            background: #0f172a;
        }
        
        body.dark-mode .page-title {
            color: #f1f5f9;
        }
        
        body.dark-mode .card {
            background: #1e293b;
            border-color: #334155;
        }
        
        body.dark-mode .card-title {
            color: #f1f5f9;
        }
        
        body.dark-mode .data-table th {
            background: #334155;
            color: #94a3b8;
        }
        
        body.dark-mode .data-table td {
            border-color: #334155;
            color: #f1f5f9;
        }
        
        body.dark-mode .form-group input,
        body.dark-mode .form-group select {
            background: #334155;
            border-color: #475569;
            color: #f1f5f9;
        }
        
        body.dark-mode .btn-secondary {
            background: #334155;
            border-color: #475569;
            color: #f1f5f9;
        }
        
        body.dark-mode .modal {
            background: #1e293b;
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar { width: 240px; }
            .main-content { margin-left: 240px; max-width: calc(100% - 240px); padding: 24px; }
        }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; max-width: 100%; padding: 20px; }
        }
        
        {% block extra_styles %}{% endblock %}
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='darkmode-fixes.css') }}">
</head>
<body>
    <div style="display: flex; min-height: 100vh;">
        <!-- Sidebar -->
        {% include "_sidebar.html" %}

        <!-- Main Content -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Botón Modo Oscuro -->
    <button onclick="toggleDarkMode()" id="darkModeBtn" style="
        position: fixed;
        bottom: 24px;
        right: 24px;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: none;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white;
        font-size: 24px;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
        z-index: 1000;
        transition: all 0.3s ease;
    ">&#127769;</button>

    <script>
        // Modo Oscuro
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            document.getElementById('darkModeBtn').textContent = '\u2600';
        }

        function toggleDarkMode() {
            const body = document.body;
            const btn = document.getElementById('darkModeBtn');
            
            if (body.classList.contains('dark-mode')) {
                body.classList.remove('dark-mode');
                btn.textContent = '\uD83C\uDF19';
                localStorage.setItem('darkMode', 'false');
            } else {
                body.classList.add('dark-mode');
                btn.textContent = '\u2600';
                localStorage.setItem('darkMode', 'true');
            }
        }

        // Zona horaria
        let timezone = localStorage.getItem('timezone') || 'America/Santiago';

        // Actualizar contador de alertas
        fetch('/api/alertas/contador')
            .then(r => r.json())
            .then(data => {
                const badge = document.getElementById('nav-alertas');
                if (badge) {
                    badge.textContent = data.total;
                    badge.style.display = data.total > 0 ? 'inline-flex' : 'none';
                }
            })
            .catch(() => {});

        {% block extra_scripts %}{% endblock %}
    </script>

<script src="{{ url_for('static', filename='app-ux.js') }}"></script>
<script src="{{ url_for('static', filename='nav-active.js') }}"></script>
</body>
</html>
