<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launcher Admin Sucrée</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #ea580c;
      --accent-dark: #c2410c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(160deg, #f8fafc 0%, #eef2ff 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .app {
      width: min(920px, 100%);
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 16px;
      box-shadow: 0 10px 26px rgba(15, 23, 42, .08);
      padding: 16px;
      display: grid;
      gap: 14px;
    }
    .head {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: 1.2rem; }
    .muted { color: var(--muted); font-size: .9rem; }
    .cfg {
      display: grid;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #f8fafc;
    }
    .cfg-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .cfg-row input { flex: 1; }
    .quick-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    label { font-size: .84rem; font-weight: 700; color: #334155; }
    input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 9px 10px;
      font: inherit;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .btn {
      border: 0;
      border-radius: 11px;
      padding: 12px;
      font-weight: 800;
      cursor: pointer;
      text-align: left;
      transition: transform .1s ease, box-shadow .2s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-main {
      color: #fff;
      background: linear-gradient(180deg, var(--accent), var(--accent-dark));
      box-shadow: 0 8px 20px rgba(234, 88, 12, .25);
    }
    .btn-sub {
      background: #fff;
      color: #1e293b;
      border: 1px solid #cbd5e1;
    }
    .btn .title { display: block; font-size: .95rem; }
    .btn .sub { display: block; margin-top: 2px; font-size: .78rem; color: #64748b; font-weight: 600; }
    .mini-btn {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #0f172a;
      border-radius: 10px;
      font-weight: 700;
      padding: 9px 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .mini-btn.accent {
      background: #16a34a;
      border-color: #16a34a;
      color: #fff;
    }
    .status {
      min-height: 20px;
      font-size: .88rem;
      color: #0f766e;
    }
    .status.err { color: #b91c1c; }
    .foot {
      border-top: 1px dashed #cbd5e1;
      padding-top: 10px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      font-size: .82rem;
      color: #64748b;
    }
    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      .btn { text-align: center; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="head">
      <div>
        <h1>Launcher Admin Pastelería Sucrée</h1>
        <div class="muted">Abre solo paneles administrativos de tu plataforma.</div>
      </div>
    </div>

    <section class="cfg">
      <label for="base-url">URL base admin</label>
      <div class="cfg-row">
        <input id="base-url" type="text" value="https://alexdroow.pythonanywhere.com" />
        <button id="save-base-url" class="mini-btn" type="button">Guardar URL</button>
      </div>
      <div class="quick-actions">
        <button id="open-editor-window" class="mini-btn" type="button">Abrir Editor en ventana</button>
        <button id="save-open-editor" class="mini-btn accent" type="button">Guardar en editor abierto</button>
      </div>
      <div class="muted">Puedes cambiarla si en el futuro migras a dominio propio.</div>
    </section>

    <section class="grid">
      <button class="btn btn-main" data-route="/ventas/admin-personalizacion">
        <span class="title">Personalización Tienda</span>
        <span class="sub">Textos, banners, estilo, agenda y reglas visuales</span>
      </button>
      <button class="btn btn-main" data-route="/ventas/admin-catalogo">
        <span class="title">Catálogo Tienda</span>
        <span class="sub">Productos, categorías y configuración comercial</span>
      </button>
      <button class="btn btn-main" data-route="/ventas/admin-catalogo-torta">
        <span class="title">Catálogo Torta</span>
        <span class="sub">Tamaños, sabores, extras, toppers y reglas</span>
      </button>
      <button class="btn btn-main" data-route="/ventas/admin-envios">
        <span class="title">Envíos Pedidos</span>
        <span class="sub">Tarifas por sector, mapa y configuración despacho</span>
      </button>
      <button class="btn btn-sub" data-route="/agenda">
        <span class="title">Agenda Admin</span>
        <span class="sub">Reservas, calendario y gestión de eventos</span>
      </button>
      <button class="btn btn-sub" data-route="/ventas" data-open-new="1">
        <span class="title">Admin Sucree Stock</span>
        <span class="sub">Estado tienda, pedidos y operación diaria</span>
      </button>
    </section>

    <div id="status" class="status"></div>

    <div class="foot">
      <span>Modo seguro: rutas públicas de tienda excluidas.</span>
      <span>Versión launcher: 0.1.0</span>
    </div>
  </main>

  <script>
    const baseInput = document.getElementById("base-url");
    const saveBaseBtn = document.getElementById("save-base-url");
    const openEditorWindowBtn = document.getElementById("open-editor-window");
    const saveOpenEditorBtn = document.getElementById("save-open-editor");
    const statusEl = document.getElementById("status");
    const STORAGE_KEY = "launcher_admin_base_url";
    let editorWindowRef = null;
    function setStatus(msg, isErr = false) {
      statusEl.textContent = msg || "";
      statusEl.classList.toggle("err", Boolean(isErr));
    }

    function normalizarBase(raw) {
      const txt = String(raw || "").trim();
      if (!txt) return "https://alexdroow.pythonanywhere.com";
      return txt.replace(/\/+$/, "");
    }

    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) baseInput.value = saved;

    baseInput.addEventListener("change", () => {
      const n = normalizarBase(baseInput.value);
      baseInput.value = n;
      localStorage.setItem(STORAGE_KEY, n);
    });

    saveBaseBtn.addEventListener("click", () => {
      const n = normalizarBase(baseInput.value);
      baseInput.value = n;
      localStorage.setItem(STORAGE_KEY, n);
      setStatus("URL base guardada.");
    });

    openEditorWindowBtn.addEventListener("click", () => {
      const baseUrl = normalizarBase(baseInput.value);
      const editorUrl = `${baseUrl}/ventas/admin-personalizacion`;
      baseInput.value = baseUrl;
      localStorage.setItem(STORAGE_KEY, baseUrl);
      editorWindowRef = window.open(editorUrl, "sucree_editor_window");
      if (!editorWindowRef) {
        setStatus("No se pudo abrir el editor en ventana (popup bloqueado).", true);
        return;
      }
      setStatus("Editor abierto en ventana separada.");
    });

    saveOpenEditorBtn.addEventListener("click", () => {
      if (!editorWindowRef || editorWindowRef.closed) {
        setStatus("Primero abre el editor en ventana separada.", true);
        return;
      }
      try {
        editorWindowRef.postMessage({ type: "SUCREE_LAUNCHER_SAVE" }, "*");
        editorWindowRef.focus();
        setStatus("Solicitud de guardado enviada al editor.");
      } catch (err) {
        setStatus("No se pudo enviar la orden de guardado al editor.", true);
      }
    });

    document.querySelectorAll("[data-route]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const route = btn.getAttribute("data-route") || "";
        const openNew = btn.getAttribute("data-open-new") === "1";
        const baseUrl = normalizarBase(baseInput.value);
        const fullUrl = `${baseUrl}${route.startsWith("/") ? route : `/${route}`}`;
        baseInput.value = baseUrl;
        localStorage.setItem(STORAGE_KEY, baseUrl);
        setStatus(`Abriendo: ${route}...`);
        if (openNew) {
          const win = window.open(fullUrl, "_blank");
          if (!win) {
            setStatus("No se pudo abrir ventana nueva (popup bloqueado).", true);
            return;
          }
          setStatus(`Abierto en nueva ventana: ${route}`);
          return;
        }
        window.location.href = fullUrl;
      });
    });
  </script>
</body>
</html>
